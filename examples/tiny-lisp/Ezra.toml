[project]
name = "tiny-lisp"

[build]
# The first target is the default for builds; the LSP checks every target so
# target-specific implementations remain complete and warning-free.
target = [
    "agonlight-mos-ez80",
    "commodore64-6502",
    "cpm-2.2-z80",
    "msdos-com-i8086",
    "zxspectrum-z80",
    "ti99-4a-tms9900",
]
executable = "tiny-lisp"
